# SwarmX V6 · models/registry.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for the local Ollama triad.
# The config system (src/swarmx/config.py → _bundle_defaults()) deep-merges
# this file at startup — no Python source edits needed to swap a model.
#
# To swap a model:
#   1. Place the new GGUF in ~/llm-local/gguf/
#   2. Update gguf_file, name, ollama_tag, quant (and context_window if changed)
#   3. Copy the nearest Modelfile template, update FROM + PARAMETER values
#   4. ollama rm <old-name>
#   5. ollama create <new-name> -f models/Modelfiles/Modelfile.<new-name>
#   6. swarm doctor
# ─────────────────────────────────────────────────────────────────────────────
version: V6
provider: ollama

triad:
  router:
    name: phi4-fast                                      # Canonical runtime tag used in API calls
    gguf_file: microsoft_Phi-4-mini-instruct-Q8_0.gguf  # Actual GGUF filename on disk
    ollama_tag: phi4-fast                                # Tag passed to `ollama create`
    aliases: [phi4-mini, phi4:mini]
    quant: Q8_0
    role: orchestrator                                   # routing, classification, fast evaluation
    context_window: 4096    # safe production ceiling; model supports 131072 natively
    num_predict: 512        # ceiling for router responses — keep decisions concise
    keep_alive: 60          # keep hot between requests (seconds)
    temperature: 0.2
    top_p: 0.90

  reason:
    name: deepseek-reasoner
    gguf_file: DeepSeek-R1-Distill-Qwen-7B-Q5_K_M.gguf
    ollama_tag: deepseek-reasoner
    aliases: [deepseek-r1, deepseek-r1:7b]
    quant: Q5_K_M
    role: reasoning                                      # planning, architecture, logic chains
    context_window: 8192
    num_predict: 2048       # deep reasoning chains need room to think
    keep_alive: 0           # unload after use — heavier model
    temperature: 0.4
    top_p: 0.92

  code:
    name: qwen-worker
    gguf_file: Qwen2.5-7B-Instruct-Q5_K_M.gguf
    ollama_tag: qwen-worker
    aliases: [qwen2.5-coder, qwen2.5-coder:7b]
    quant: Q5_K_M
    role: execution                                      # code generation, tool-use, agentic tasks
    context_window: 8192
    num_predict: 4096       # large ceiling — code generation is verbose
    keep_alive: 0
    temperature: 0.15
    top_p: 0.95
