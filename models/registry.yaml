# ── Lab — evolve models (disabled by default) ─────────────────────────────────
evolve_workflow:
  enabled_by_default: false
  models:
    - operator_name: Lab
      name: synth-phi4-exp-q8-dev
      gguf_file: microsoft_Phi-4-mini-instruct-Q8_0.gguf
      ollama_tag: synth-phi4-exp-q8-dev
      legacy_aliases:
        - phi4-evolve-scar
        - phi4-fast:swarmx-evolve
        - phi4-mini:swarmx-evolve
      quant: Q8_0
      role: synth
      composer_tier: 2
      context_window: 6144
      is_7b: false
      ram_mb: 4440

    - operator_name: Lab
      name: synth-deepseekr1-exp-q5km-dev
      gguf_file: DeepSeek-R1-Distill-Qwen-7B-Q5_K_M.gguf
      ollama_tag: synth-deepseekr1-exp-q5km-dev
      legacy_aliases:
        - deepseek-evolve-scar
        - deepseek-r1:swarmx-evolve
      quant: Q5_K_M
      role: synth
      composer_tier: 4
      context_window: 6144
      is_7b: true
      ram_mb: 5370

    - operator_name: Lab
      name: synth-qwen25-exp-q5km-dev
      gguf_file: Qwen2.5-7B-Instruct-Q5_K_M.gguf
      ollama_tag: synth-qwen25-exp-q5km-dev
      legacy_aliases:
        - qwen-evolve-scar
        - qwen2.5:swarmx-evolve
      quant: Q5_K_M
      role: synth
      composer_tier: 3
      context_window: 6144
      is_7b: true
      ram_mb: 5370

# ── Constraints enforced by ModelOrchestrator ─────────────────────────────────
constraints:
  single_7b_lock: true
  max_resident_7b_models: 1
  max_resident_non7b_models: 2
  evolve_requires_explicit_mode: true
  always_resident_relay: true   # [REG-r7-05] Relay is always-on; never evict

# ── Operator taxonomy (informational; do not edit) ────────────────────────────
operator_taxonomy:
  Relay:     {role: route,    purpose: "Ultra-light routing and intent classification"}
  Pilot:     {role: instruct, purpose: "Fast generalist, session routing, intake"}
  Architect: {role: plan,     purpose: "Planning, orchestration, strategy"}
  Forge:     {role: code,     purpose: "Code generation, execution, tool use"}
  Oracle:    {role: reason,   purpose: "Deep reasoning, diagnosis, architecture"}
  Auditor:   {role: critique, purpose: "Adversarial review, validation, safety"}
  Lab:       {role: synth,    purpose: "Experimental evolution and synthesis"}
