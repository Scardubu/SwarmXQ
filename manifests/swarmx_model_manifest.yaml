# ─── Production model stack — Canonical Names ──────────────────────────────
stack:
  # ── Always-resident core ──────────────────────────────────────────────────
  always_resident:
    - operator: Relay
      model: route-phi4-lite-q4km-prod
      legacy_alias: phi4-router-lite-scar
      modelfile: models/Modelfiles/primary/route-phi4-lite-q4km-prod.modelfile
      quant: Q4_K_M
      ram_mb: 2500    # weights ~2.1 GB + KV@2048 ~96 MB + OH ~300 MB
      ctx: 2048
      is_7b: false
      role: route
      description: "Ultra-light intent router and safety gate"

  # ── Default load triad (Pilot always available; Oracle/Forge load on demand)
  default_triad:
    - operator: Pilot
      model: instruct-phi4-pro-q8-prod
      legacy_alias: phi4-fast-scar
      modelfile: models/Modelfiles/primary/instruct-phi4-pro-q8-prod.modelfile
      quant: Q8_0
      ram_mb: 4270    # weights ~4.0 GB + KV@2048 ~192 MB + OH ~300 MB
      ctx: 2048
      is_7b: false
      role: instruct
      description: "Session router, fast chat, low-complexity Q&A"

    - operator: Oracle
      model: reason-deepseekr1-pro-q5km-prod
      legacy_alias: deepseek-reasoner-scar
      modelfile: models/Modelfiles/primary/reason-deepseekr1-pro-q5km-prod.modelfile
      quant: Q5_K_M
      ram_mb: 5370    # weights ~5.0 GB + KV@6144 ~280 MB + OH ~300 MB
      ctx: 6144
      is_7b: true
      role: reason
      description: "Deep reasoning, architecture, planning, causal analysis"

    - operator: Forge
      model: code-qwen25-pro-q5km-prod
      legacy_alias: qwen-worker-scar
      modelfile: models/Modelfiles/primary/code-qwen25-pro-q5km-prod.modelfile
      quant: Q5_K_M
      ram_mb: 5370
      ctx: 6144
      is_7b: true
      role: code
      description: "Code generation, tool-use, agentic execution"

  # ── Optional overlays ────────────────────────────────────────────────────
  optional:
    - operator: Architect
      model: plan-phi4-pro-q8-prod
      legacy_alias: phi4-worker-scar
      ram_mb: 4340
      is_7b: false

    - operator: Architect
      model: plan-qwen25-pro-q5km-prod
      legacy_alias: qwen-supervisor-scar
      ram_mb: 5370
      is_7b: true

    - operator: Architect
      model: plan-deepseekr1-pro-q5km-prod
      legacy_alias: deepseek-supervisor-scar
      ram_mb: 5370
      is_7b: true

    - operator: Auditor
      model: critique-deepseekr1-pro-q5km-prod
      legacy_alias: deepseek-critic-scar
      ram_mb: 5420
      is_7b: true

  # ── Lab (experimental — requires --enable-evolve) ────────────────────────
  experimental:
    - operator: Lab
      model: synth-phi4-exp-q8-dev
      legacy_alias: phi4-evolve-scar
      ram_mb: 4440
      is_7b: false
      phase: 1   # observe / fitness

    - operator: Lab
      model: synth-deepseekr1-exp-q5km-dev
      legacy_alias: deepseek-evolve-scar
      ram_mb: 5370
      is_7b: true
      phase: [2, 4]   # critique / validate

    - operator: Lab
      model: synth-qwen25-exp-q5km-dev
      legacy_alias: qwen-evolve-scar
      ram_mb: 5370
      is_7b: true
      phase: 3   # mutate

