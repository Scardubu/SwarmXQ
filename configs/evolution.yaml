# SwarmX APEX-17 r7 · configs/evolution.yaml
# Evolution overlay — Lab Operator assignments.
#
# Changelog v2026.5.25-apex17-r7:
#   [EVO-r7-01] observer_model, critic_model, mutator_model migrated from
#               pre-scar canonical names to APEX-17 canonical production tags.
#               Lab is the Operator name for all evolve models.
#               Note: evolve models are exp/dev tier — only loaded under
#               --enable-evolve flag.

proposal_only_by_default: true
fitness_threshold: 0.74
selection: tournament
candidate_count: 3

multi_island:
  islands: 3
  island_labels: [alpha, beta, gamma]
  crossover_probability_exploit: 0.30
  crossover_probability_explore: 0.60
  convergence_window: 3

promptbreeder:
  strategy_promotion_wins: 2
  max_active_strategies: 5
  strategy_demotion_losses: 4

scoring_axes:
  - correctness
  - leverage
  - reversibility
  - simplicity
  - swarm_synergy

self_improving_layer:
  enabled: true
  default_cycles: 1

  # Model assignments for the observe → critique → mutate pipeline.
  # All three are Lab Operators (synth-* role) and require explicit --enable-evolve.
  # The non-Lab production models (Pilot, Oracle, Forge) handle live traffic only.
  observer_model: synth-phi4-exp-q8-dev          # Lab (phi4) — Phase 1 fitness snapshot
  critic_model:   synth-deepseekr1-exp-q5km-dev  # Lab (deepseek) — Phase 2 + Phase 4
  mutator_model:  synth-qwen25-exp-q5km-dev      # Lab (qwen25) — Phase 3 mutation

  deploy_requires:
    min_score_delta: 0.05
    risk: low

  artifact_store: evolution-layer

  # stage_only_mode: true → winning mutations written as staged proposals,
  # never auto-applied to the live swarm. allow_auto_deploy: false in
  # v6-overlay.yaml reinforces this at the overlay level.
  stage_only_mode: true

  validate_against:
    - baseline        # must outperform current production baseline
    - previous_best   # must outperform prior staged winner
    - safety_rules    # must pass guardrails safety ruleset
