# SwarmXQ APEX-17 r7-final · configs/routing.yaml
# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG v2026.5.25-apex17-r7:
#   [ROUTE-r7-01] All model identifiers migrated from -scar suffix to canonical
#                 grammar: <role>-<family>-<tier>-<quant>-<env>
#   [ROUTE-r7-02] Operator names (Relay, Pilot, Architect, Forge, Oracle,
#                 Auditor, Lab) used in comments; canonical tags in values
#   [ROUTE-r7-03] adversarial_check.critic_model corrected to canonical Pilot tag
#                 (was phi4-router-lite-scar — wrong critic; Relay is router not critic)
#   [ROUTE-r7-04] narrative.model migrated to Pilot canonical tag
#                 (was phi4-router-lite-scar — Relay is too limited for narrative)
#   [ROUTE-r7-05] exclusive_pairs uses canonical tags
#   [ROUTE-r7-06] Triadic dispatch lists agent assignment by Operator
#
# Operator → canonical tag legend (read once, apply everywhere):
#   Relay     → route-phi4-lite-q4km-prod        (~2.5 GB, Q4_K_M)
#   Pilot     → instruct-phi4-pro-q8-prod        (~4.3 GB, Q8_0)
#   Architect → plan-{phi4|qwen25|deepseekr1}-pro-*-prod
#   Forge     → code-qwen25-pro-q5km-prod        (~5.4 GB, Q5_K_M, 7B)
#   Oracle    → reason-deepseekr1-pro-q5km-prod  (~5.4 GB, Q5_K_M, 7B)
#   Auditor   → critique-deepseekr1-pro-q5km-prod (~5.4 GB, Q5_K_M, 7B)
#   Lab       → synth-*-exp-*-dev                (experimental only)
# ─────────────────────────────────────────────────────────────────────────────

triadic_model_config:

  # ── Pilot (instruct-phi4-pro-q8-prod) — Fast Orchestrator ───────────────────
  # Fast orchestrator. Fires first on many requests, but is not always-on.
  # RAM footprint: ~4.3 GB. Keep only a short reuse window on 8 GB hosts.
  instruct-phi4-pro-q8-prod:
    operator_name: Pilot
    ollama_model: instruct-phi4-pro-q8-prod
    legacy_aliases: [phi4-fast-scar, phi4-fast, phi4-mini]
    gguf_file: microsoft_Phi-4-mini-instruct-Q8_0.gguf
    quant: Q8_0
    ram_footprint_gb: 4.3
    role: orchestrator
    always_on: false
    context_window: 2048
    temperature: 0.20
    top_p: 0.90
    timeout_seconds: 30
    keep_alive: 30             # 30s short reuse window
    num_predict: 1024
    dispatch_signal: "router"
    adversarial_check: false   # Pilot is the router, not the critiqued
    proposer_solver:
      enabled: false
      n_candidates: 1
    streaming: false
    responsibilities:
      - task classification (T1/T2/T3/T4 signal triage)
      - model routing decision
      - escalation control
      - lightweight evaluation scoring
      - swarm coherence pulse
      - stop condition enforcement (μ-1)

  # ── Oracle (reason-deepseekr1-pro-q5km-prod) — Reasoning Engine ─────────────
  # Deep planner. Fires on planning/architecture/analysis tasks.
  # RAM footprint: ~5.4 GB. Unload after each call (SINGLE-7B LOCK).
  reason-deepseekr1-pro-q5km-prod:
    operator_name: Oracle
    ollama_model: reason-deepseekr1-pro-q5km-prod
    legacy_aliases: [deepseek-reasoner-scar, deepseek-reasoner, deepseek-r1, deepseek-r1:7b]
    gguf_file: DeepSeek-R1-Distill-Qwen-7B-Q5_K_M.gguf
    quant: Q5_K_M
    ram_footprint_gb: 5.4
    role: reasoning
    always_on: false
    context_window: 6144
    temperature: 0.40
    top_p: 0.92
    timeout_seconds: 300
    keep_alive: 0              # UNLOAD after each call (8 GB RAM discipline)
    num_predict: 4096
    dispatch_signal: "reason"
    adversarial_check: true    # Oracle output critiqued by Auditor
    proposer_solver:
      enabled: true
      n_candidates: 2
    streaming: false
    responsibilities:
      - workflow planning and decomposition
      - architecture review and proposal
      - causal chain tracing
      - blast-radius delta simulation
      - island strategy selection
      - complex research synthesis
      - ZK architecture and circuit design
      - ML pipeline design

  # ── Forge (code-qwen25-pro-q5km-prod) — Execution Engine ────────────────────
  # Code generator and tool executor. Fires on implementation tasks.
  # RAM footprint: ~5.4 GB. Unload after each call (SINGLE-7B LOCK).
  code-qwen25-pro-q5km-prod:
    operator_name: Forge
    ollama_model: code-qwen25-pro-q5km-prod
    legacy_aliases: [qwen-worker-scar, qwen-worker, qwen2.5-coder, qwen2.5-coder:7b]
    gguf_file: Qwen2.5-7B-Instruct-Q5_K_M.gguf
    quant: Q5_K_M
    ram_footprint_gb: 5.4
    always_on: false
    context_window: 6144
    temperature: 0.15
    top_p: 0.95
    timeout_seconds: 120
    keep_alive: 0              # UNLOAD after each call
    num_predict: 4096
    dispatch_signal: "code"
    adversarial_check: true    # Forge output critiqued by Auditor
    proposer_solver:
      enabled: true
      n_candidates: 2
    streaming: true            # streaming for long code generation
    responsibilities:
      - code generation and refactoring
      - tool-use and MCP calls
      - test generation
      - agentic task execution
      - frontend component generation (Next.js 15 / React 19 / RSC)
      - backend API implementation (Fastify 5 / Prisma 5)
      - security code review
      - NRS e-invoice schema implementation
      - OpenTelemetry instrumentation
      - ZK circuit implementation
      - Effect-TS service layer implementation
      - BullMQ worker with OpenTelemetry tracing

# ── Model selection variables ────────────────────────────────────────────────
# Priority: SWARM_MODEL_* env > MODEL_* env > these defaults
routing:
  provider: ollama
  base_url: http://localhost:11434
  model_fast:   instruct-phi4-pro-q8-prod         # Pilot
  model_reason: reason-deepseekr1-pro-q5km-prod   # Oracle
  model_code:   code-qwen25-pro-q5km-prod         # Forge
  workflow_preference: autonomous-pipeline
  framework_preference: []

  # Triadic dispatch: Operator → agent roles
  triadic_dispatch:
    # Pilot — fast routing, light evaluation, status
    instruct-phi4-pro-q8-prod:
      - strategist
      - workflow-router
      - memory-curator
      - evaluator
      - risk-sentinel
      - skill-sentinel
      - skill-check
      - release-manager
      - tournament-judge
      - design-critic
      - expert-pool
      - signal-triage
      - swarm-coherence-probe

    # Oracle — deep planning, architecture, complex reasoning
    reason-deepseekr1-pro-q5km-prod:
      - chief-architect
      - workflow-composer
      - research-analyst
      - context-researcher
      - subagent-coordinator
      - benchmark-analyst
      - evolver
      - security-auditor
      - incident-commander
      - prompt-architect
      - zk-architect
      - ml-ops-engineer
      - compliance-auditor

    # Forge — implementation, tool execution
    code-qwen25-pro-q5km-prod:
      - backend-engineer
      - frontend-architect
      - data-engineer
      - perf-optimizer
      - performance-optimizer
      - mcp-toolsmith
      - security-reviewer
      - qa-evaluator
      - producer
      - reviewer
      - skill-developer
      - skill-librarian
      - skill-curator
      - environment-governor
      - tool-agent
      - refactor-agent

  # Escalation chain: primary unavailable → try in order
  escalation_chain:
    instruct-phi4-pro-q8-prod:       [instruct-phi4-pro-q8-prod, reason-deepseekr1-pro-q5km-prod, code-qwen25-pro-q5km-prod]
    reason-deepseekr1-pro-q5km-prod: [reason-deepseekr1-pro-q5km-prod, code-qwen25-pro-q5km-prod, instruct-phi4-pro-q8-prod]
    code-qwen25-pro-q5km-prod:       [code-qwen25-pro-q5km-prod, reason-deepseekr1-pro-q5km-prod, instruct-phi4-pro-q8-prod]

  # Legacy aliases (kept ONLY for SwarmConfig normalize_model_tag bridge)
  legacy_aliases:
    model_fast_alias:   phi4-fast-scar
    model_reason_alias: deepseek-reasoner-scar
    model_code_alias:   qwen-worker-scar

# ── Dispatch signal rules ────────────────────────────────────────────────────
dispatch_rules:
  code_signals:
    - implement
    - refactor
    - test
    - tool_call
    - generate_code
    - security_review
    - frontend
    - backend
    - data_pipeline
    - build
    - deploy
    - debug
    - fix
    - patch
    - scaffold
    - component
    - api
    - endpoint
    - schema
    - migration
    - webhook
    - middleware
    - plugin
    - mcp
    - agentic
    - instrument
    - circuit
  reason_signals:
    - plan
    - strategy
    - reason
    - research
    - architecture
    - analyze
    - analyse
    - simulate
    - evaluate_deep
    - causal_trace
    - design
    - review
    - audit
    - propose
    - assessment
    - tradeoff
    - decision
    - compare
    - compliance
    - zk
    - ml_design
  router_signals:
    - classify
    - route
    - evaluate_fast
    - memory_write
    - coherence_check
    - status
    - score
    - drain

# ── Parallel execution policy ────────────────────────────────────────────────
parallel:
  orchestrator_concurrent_with_specialists: true
  max_concurrent_specialist_calls: 1
  queue_overflow_policy: queue

# ── Controller integration ────────────────────────────────────────────────────
controller:
  version: "APEX-17-r7"
  dispatch_log: "controller/dispatch.jsonl"
  chain_log:    "controller/chain_*.jsonl"
  gate_pre_chain:  true
  gate_post_chain: true

  session_mode_env:
    router: SWARM_KEEP_ALIVE_ROUTER
    reason: SWARM_KEEP_ALIVE_REASON
    code:   SWARM_KEEP_ALIVE_CODE

  # 8 GB RAM guard: models that should NEVER be co-loaded
  # [ROUTE-r7-05] Canonical tags
  exclusive_pairs:
    - [reason-deepseekr1-pro-q5km-prod, code-qwen25-pro-q5km-prod]    # Oracle + Forge
    - [reason-deepseekr1-pro-q5km-prod, plan-qwen25-pro-q5km-prod]    # Oracle + Architect-qwen
    - [code-qwen25-pro-q5km-prod, critique-deepseekr1-pro-q5km-prod]  # Forge + Auditor
    - [reason-deepseekr1-pro-q5km-prod, critique-deepseekr1-pro-q5km-prod]  # Oracle + Auditor

# ── Proposer-solver config ──────────────────────────────────────────────────
proposer_solver:
  enabled_by_default: false
  n_candidates:
    orchestrator: 1
    reasoning:    2
    execution:    2
  temperature_variance: 0.05

# ── Tournament config ───────────────────────────────────────────────────────
tournament:
  enabled_by_default: false
  trigger_on_risk: [high, critical]
  models: [code-qwen25-pro-q5km-prod, reason-deepseekr1-pro-q5km-prod, instruct-phi4-pro-q8-prod]
  fitness_threshold: 0.70

# ── Memory injection ─────────────────────────────────────────────────────────
memory_injection:
  enabled: true
  max_lines: 10
  max_age_hours: 24
  inject_into_roles: [all]

# ── Skill injection ──────────────────────────────────────────────────────────
skill_injection:
  enabled: true
  max_skills_per_call: 3
  max_chars_per_skill: 300
  skill_dirs:
    - "{SWARM_HOME}/skills"
    - "{SWARM_ROOT}/skills"

# ── MCP tool injection ───────────────────────────────────────────────────────
mcp_injection:
  enabled: true
  inject_for_roles: [execution]
  max_tools: 20
  tooling_dir: "{SWARM_HOME}/tooling"

# ── Prompt compression ───────────────────────────────────────────────────────
compression:
  enabled: true
  strategy: signal_hierarchy
  max_chars_per_model:
    instruct-phi4-pro-q8-prod:       10000   # Pilot
    reason-deepseekr1-pro-q5km-prod: 20000   # Oracle
    code-qwen25-pro-q5km-prod:       20000   # Forge

# ── Response cache ───────────────────────────────────────────────────────────
cache:
  enabled: false
  ttl_seconds: 3600
  cache_dir: "{SWARM_HOME}/llm_cache"
  max_size_mb: 500
  exclude_roles: [evaluator, adversarial-critic]

# ── Latency guards ───────────────────────────────────────────────────────────
latency_guard:
  thresholds_ms:
    instruct-phi4-pro-q8-prod:       30000    # Pilot — 30s P95
    reason-deepseekr1-pro-q5km-prod: 300000   # Oracle — 5min P95
    code-qwen25-pro-q5km-prod:       120000   # Forge — 2min P95
  spike_action: warn
  flush_command: "./swarm-controller.sh flush"

# ── Controller v4.1 feature flags ────────────────────────────────────────────
controller_v41:
  adversarial_critique_phase:
    enabled_by_env: SWARM_ADVERSARIAL
    enabled_by_flag: "--adversarial"
    critic_model: instruct-phi4-pro-q8-prod    # Pilot acts as critic in chain mode
    sample_chars: 1200

  proposer_solver_flag:
    enabled_by_flag: "--proposer-solver"
    python_path: src/swarmx/llm.py::generate(use_proposer_solver=True)

  self_test_gate:
    enabled_by_flag: "--self-test"
    fixture: synthetic-runtime-dir

# ── Adversarial check config ────────────────────────────────────────────────
# [ROUTE-r7-03] critic_model fixed: was wrongly route-phi4-lite-scar (Relay).
# Relay is a deterministic router with 96-token output ceiling — cannot critique.
# Pilot (instruct-phi4-pro-q8-prod) has 256-token budget + reasoning capability.
adversarial_check:
  enabled_by_default: false
  critic_model: instruct-phi4-pro-q8-prod      # Pilot — lightweight adversarial critic
  critic_timeout_seconds: 30
  max_response_chars_sampled: 1200
  enable_for_risk: [high, critical]

# ── Streaming config ─────────────────────────────────────────────────────────
streaming:
  enabled_by_default: false
  chunk_size: 1
  flush_interval_ms: 50

# ── Resource sentinel ────────────────────────────────────────────────────────
resource_sentinel:
  vram_ceiling_gb: 10
  error_spike_threshold: 8
  ollama_timeout_seconds: 5
  gpu_layer_check: true
  auto_flush_on_ceiling: true

# ── LLM retry policy ─────────────────────────────────────────────────────────
llm_retry:
  max_retries: 3
  base_backoff_seconds: 1.0

  sandbox:
    enabled: false
    image: "swarmx-sandbox:v5"
    timeout_seconds: 120
    network: none
    memory_limit_mb: 512
    cpu_shares: 512

  # [ROUTE-r7-04] narrative.model migrated from phi4-router-lite-scar (Relay)
  # to canonical Pilot. Relay is JSON-only with 96-token cap; narrative
  # synthesis needs 3-5 sentences which requires Pilot's wider scope.
  narrative:
    model: "instruct-phi4-pro-q8-prod"  # Pilot
    min_sentences: 3
    max_sentences: 5
    inject_into_run_record: true

  scs:
    warn_threshold: 0.50
    critical_threshold: 0.30
    measurement_window_runs: 10

  mcp:
    enabled: false
    host: "127.0.0.1"
    port: 9090
    allowlist: []

  checkpoint:
    stages:
      - after_plan
      - after_task
      - before_evolve
      - interrupt
    compress_snapshots: true
    max_snapshots_per_run: 50

  retryable_errors:
    - URLError
    - TimeoutError
    - ConnectionError
  non_retryable_errors:
    - json.JSONDecodeError
    - KeyboardInterrupt

# ── Controller v4.2 feature flags ───────────────────────────────────────────
controller_v42:
  resource_guard:
    enabled: true
    env_override: SWARM_VRAM_CEILING_GB
    default_ceiling_gb: 10
    called_by: [cmd_chain, cmd_solve, cmd_code, cmd_reason]

  health_flag:
    enabled_by_flag: "--health"
    routes_to: "swarm-gate.sh --health"
    gate: "μ-10"

  generate_result_v42:
    retry_count:   "int — retries consumed before successful response"
    vram_warning:  "bool — True if VRAM near ceiling at dispatch time"
    quant_level:   "str — model quantisation hint (e.g. Q4_K_M, F16, unknown)"

  vertical_config_loader:
    enabled: true
    config_path: "configs/verticals/{vertical}.yaml"
    example_keys: [extra_constraints, max_decimal_precision, audit_log_required]
