# SwarmX APEX-17 r7 · configs/swarmx.defaults.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Mission-aware control plane defaults.
#
# CHANGELOG v2026.5.25-apex17-r7:
#   [DEF-r7-01] All model_* fields migrated to canonical production tags
#               (was -scar in r5–r6, pre-scar before that)
#   [DEF-r7-02] triadic_dispatch keys use canonical Operator tags
#   [DEF-r7-03] Operator name annotations added in comments
#
# Operator → canonical tag map:
#   Pilot     → instruct-phi4-pro-q8-prod         (router/orchestrator)
#   Oracle    → reason-deepseekr1-pro-q5km-prod   (reasoning/planning)
#   Forge     → code-qwen25-pro-q5km-prod         (execution/code)
#   Relay     → route-phi4-lite-q4km-prod         (ultra-light first-pass)
# ─────────────────────────────────────────────────────────────────────────────

runtime:
  autonomous: true
  review_required: false
  auto_apply: false
  max_iterations: 3
  checkpoint_every: 1
  signal_triage_on_entry: true
  output_quality_gate_on_exit: true

  mission_budget: 4
  worker_pool_size: 1
  worker_interval: 2.0
  control_mode: hybrid

# ── MODEL TRIAD — Canonical Operator Tags ─────────────────────────────────────
routing:
  provider: ollama
  base_url: http://localhost:11434

  # Primary model assignments (canonical tags)
  model_fast:   instruct-phi4-pro-q8-prod         # Pilot — always-on orchestrator
  model_reason: reason-deepseekr1-pro-q5km-prod   # Oracle — reasoning/planning
  model_code:   code-qwen25-pro-q5km-prod         # Forge — execution/code

  # Triadic dispatch rules — Operator → agent roles
  triadic_dispatch:
    instruct-phi4-pro-q8-prod:  # Pilot — light routing, evaluation, status
      - strategist
      - workflow-router
      - memory-curator
      - evaluator
      - risk-sentinel
      - skill-sentinel
      - skill-check
      - release-manager
      - tournament-judge

    reason-deepseekr1-pro-q5km-prod:  # Oracle — deep planning, architecture
      - chief-architect
      - workflow-composer
      - research-analyst
      - context-researcher
      - subagent-coordinator
      - benchmark-analyst
      - evolver
      - security-auditor
      - incident-commander
      - prompt-architect

    code-qwen25-pro-q5km-prod:  # Forge — implementation, code, tool execution
      - backend-engineer
      - frontend-architect
      - data-engineer
      - perf-optimizer
      - performance-optimizer
      - mcp-toolsmith
      - security-reviewer
      - qa-evaluator
      - producer
      - reviewer
      - skill-developer
      - skill-librarian
      - skill-curator

  # Escalation chain — primary unavailable → fall back in order
  escalation_chain:
    instruct-phi4-pro-q8-prod:       [instruct-phi4-pro-q8-prod, reason-deepseekr1-pro-q5km-prod, code-qwen25-pro-q5km-prod]
    reason-deepseekr1-pro-q5km-prod: [reason-deepseekr1-pro-q5km-prod, code-qwen25-pro-q5km-prod, instruct-phi4-pro-q8-prod]
    code-qwen25-pro-q5km-prod:       [code-qwen25-pro-q5km-prod, reason-deepseekr1-pro-q5km-prod, instruct-phi4-pro-q8-prod]

  # Legacy aliases — kept ONLY for SwarmConfig.normalize_model_tag()
  model_fast_alias:   phi4-fast-scar
  model_reason_alias: deepseek-reasoner-scar
  model_code_alias:   qwen-worker-scar

safety:
  approval_required_for: [high, critical]
  auto_apply_risk_floor: low
  allow_destructive_actions: false

evolution:
  proposal_only_by_default: true
  auto_apply_low_risk: true
  selection_strategy: tournament
  multi_island:
    islands: 3
    crossover_probability_exploit: 0.30
    crossover_probability_explore: 0.60
    convergence_window: 3
  promptbreeder:
    strategy_promotion_wins: 2
    max_active_strategies: 5
  budget:
    refinement_passes: 2
    proposals_per_run: 3

observability:
  trace_every_stage: true
  persist_run_artifacts: true
  stream_interval: 2.0
  event_retention: 200
  mission_retention: 100

# ── Startup autopilot ───────────────────────────────────────────────────────
startup:
  health_timeout_s: 6.0
  warmup_timeout_s: 20.0
  evolver_timeout_s: 15.0
  # [DEF-r7-04] Predictive warmup target — Relay (Q4_K_M, ~2.5GB) loads on boot
  warmup_target: route-phi4-lite-q4km-prod

# ── Memory ───────────────────────────────────────────────────────────────────
memory:
  graph_limit: 250
  search_limit: 20
  retain_recent_runs: 50
  retain_recent_memories: 200

# ── Storage ──────────────────────────────────────────────────────────────────
storage:
  backend: sqlite+jsonl

# ── MCP defaults ─────────────────────────────────────────────────────────────
mcp:
  allowlist:
    - git
    - python
    - python3
    - bash
    - node
    - npm
    - pnpm
    - pip
    - curl
    - wget

# ── Pressure-aware governance ────────────────────────────────────────────────
governance:
  pressure:
    warn_available_mb: 1500
    critical_available_mb: 800
    zram_warn_used_pct: 60
    zram_critical_used_pct: 85
    check_interval_s: 5.0

  concurrency:
    normal_max: 2
    high_max: 1
    critical_max: 1

  token_ceilings:
    instruct-phi4-pro-q8-prod:       1024   # Pilot
    plan-qwen25-pro-q5km-prod:       1024   # Architect-qwen
    plan-deepseekr1-pro-q5km-prod:   1024   # Architect-deepseek
    code-qwen25-pro-q5km-prod:       4096   # Forge
    reason-deepseekr1-pro-q5km-prod: 2048   # Oracle
    critique-deepseekr1-pro-q5km-prod: 1024 # Auditor

  escalation:
    strict_tier_enforcement: true

  handoff:
    max_context_chars: 2000
    compress_above_chars: 800

  observe_only: false
